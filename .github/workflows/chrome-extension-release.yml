name: Chrome Extension Release

on:
  push:
    branches: [ main ]
    paths:
      - "chrome-extension/**"

jobs:
  release:
    name: Package and Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Read extension version
        id: version
        run: |
          VERSION=$(jq -r '.version' chrome-extension/manifest.json)
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=chrome-extension-v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Package extension
        run: |
          cd chrome-extension
          zip -r "../cookie-exporter-v${{ steps.version.outputs.version }}.zip" \
            manifest.json popup.html popup.js options.html options.js README.md

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Cookie Exporter v${{ steps.version.outputs.version }}"
          body: |
            Chrome extension release - Cookie Exporter v${{ steps.version.outputs.version }}.

            ### Installation
            1. Download `cookie-exporter-v${{ steps.version.outputs.version }}.zip` below.
            2. Unzip it into a local folder.
            3. Open `chrome://extensions`, enable **Developer mode**, click **Load unpacked**, and select that folder.

            See the [README](https://github.com/${{ github.repository }}/blob/main/chrome-extension/README.md) for full usage instructions.
          files: "cookie-exporter-v${{ steps.version.outputs.version }}.zip"
          make_latest: true
